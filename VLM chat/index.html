<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VLM Chat - Hailo-10H</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 10px 20px; background: #16213e; border-bottom: 1px solid #0f3460; font-size: 14px; color: #8899aa; display: flex; align-items: center; justify-content: space-between; }
  #header .title { font-weight: 600; }
  #header .info { font-size: 12px; color: #556; }
  #main { flex: 1; display: flex; overflow: hidden; }

  /* Levy panel - kamera */
  #video-panel { width: 50%; background: #111; display: flex; flex-direction: column; border-right: 1px solid #0f3460; }
  #video-panel .panel-label { padding: 8px 16px; font-size: 12px; color: #556; background: #0d1b2a; border-bottom: 1px solid #0f3460; text-transform: uppercase; letter-spacing: 1px; }
  #video-panel img { width: 100%; height: 100%; object-fit: contain; }

  /* Pravy panel - chat */
  #chat-panel { width: 50%; display: flex; flex-direction: column; }
  #chat-panel .panel-label { padding: 8px 16px; font-size: 12px; color: #556; background: #0d1b2a; border-bottom: 1px solid #0f3460; text-transform: uppercase; letter-spacing: 1px; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 90%; padding: 10px 14px; border-radius: 10px; line-height: 1.5; word-wrap: break-word; font-size: 14px; }
  .msg.user { align-self: flex-end; background: #0f3460; }
  .msg.bot { align-self: flex-start; background: #222244; }
  .msg .elapsed { display: block; margin-top: 4px; font-size: 11px; color: #556; }

  #input-bar { display: flex; gap: 8px; padding: 10px 16px; background: #16213e; border-top: 1px solid #0f3460; }
  #input-bar input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
  #input-bar input:focus { border-color: #e94560; }
  #input-bar input::placeholder { color: #445; }
  #input-bar button { padding: 10px 18px; border-radius: 8px; border: none; background: #e94560; color: white; font-size: 14px; cursor: pointer; white-space: nowrap; }
  #input-bar button:disabled { background: #333; cursor: not-allowed; }

  .cursor { display: inline-block; width: 2px; height: 1em; background: #e94560; animation: blink 0.7s infinite; vertical-align: text-bottom; margin-left: 1px; }
  @keyframes blink { 50% { opacity: 0; } }

  @media (max-width: 800px) {
    #main { flex-direction: column; }
    #video-panel, #chat-panel { width: 100%; }
    #video-panel { height: 40%; }
    #chat-panel { height: 60%; }
  }
</style>
</head>
<body>
<div id="header">
  <span class="title">Raspberry Pi + Hailo-10H</span>
  <span class="info">VLM model: Qwen2-VL-2B-Instruct</span>
</div>
<div id="main">
  <div id="video-panel">
    <div class="panel-label">Live kamera</div>
    <img id="mjpeg" src="/stream" alt="Camera stream">
  </div>
  <div id="chat-panel">
    <div class="panel-label">Chat</div>
    <div id="chat"></div>
    <div id="input-bar">
      <input type="text" id="question" placeholder="Poloz otazku... (prazdny = Describe the image)" autofocus>
      <button id="send" onclick="send()">Odeslat</button>
    </div>
  </div>
</div>
<script>
const chat = document.getElementById('chat');
const qInput = document.getElementById('question');
const btn = document.getElementById('send');
let ws = null, botMsg = null, botText = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'chunk') {
      botText.textContent += msg.text;
      chat.scrollTop = chat.scrollHeight;
    } else if (msg.type === 'done') {
      const cur = botMsg.querySelector('.cursor');
      if (cur) cur.remove();
      const el = document.createElement('span');
      el.className = 'elapsed';
      el.textContent = msg.elapsed + 's';
      botMsg.appendChild(el);
      btn.disabled = false;
      qInput.focus();
      chat.scrollTop = chat.scrollHeight;
    } else if (msg.type === 'error') {
      botText.textContent += ' [Chyba: ' + msg.text + ']';
      const cur = botMsg.querySelector('.cursor');
      if (cur) cur.remove();
      btn.disabled = false;
      qInput.focus();
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
}

function send() {
  const q = qInput.value.trim();
  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.textContent = q || 'Describe the image';
  chat.appendChild(userDiv);

  botMsg = document.createElement('div');
  botMsg.className = 'msg bot';
  botText = document.createElement('span');
  botMsg.appendChild(botText);
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  botMsg.appendChild(cursor);
  chat.appendChild(botMsg);
  chat.scrollTop = chat.scrollHeight;

  ws.send(JSON.stringify({question: q}));
  qInput.value = '';
  btn.disabled = true;
}

qInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !btn.disabled) send();
});

connect();
</script>
</body>
</html>
