; UnoWeb - minimalni WWW server na ATMEGA328P + W5500 + SHT40
;
; Cil: demonstrace, ze WWW server bezi i na 2 kB SRAM cipu.
; Zadne knihovny Ethernet/Wire/Adafruit - vse raw pres registry.
;
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
board_build.f_cpu = 16000000L
monitor_speed = 115200

; -Os = optimalizace na velikost, -flto = link-time optimization (mensi binarka),
; -ffunction-sections/-fdata-sections + --gc-sections = odstraneni mrtveho kodu.
build_flags =
    -Os
    -flto
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -funsigned-char
    -fno-exceptions

; Vypis velikosti RAM/flash po buildu vidi uzivatel ve vystupu PlatformIO.
build_unflags = -fexceptions
